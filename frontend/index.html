<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Deblurring — Linear Algebra Pipeline</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <h1>Image Deblurring</h1>
    <p class="subtitle">A 9-step linear algebra pipeline</p>
  </header>

  <main>
    <section class="upload-section">
      <label for="img-input" class="upload-box" id="upload-label">
        <span id="upload-text">Click to upload an image</span>
        <input type="file" id="img-input" accept="image/*" hidden />
      </label>
      <button id="run-btn" disabled>Run pipeline</button>
    </section>

    <div id="pipeline" class="pipeline hidden"></div>
  </main>

  <script src="main.js"></script>
</body>

</html>
